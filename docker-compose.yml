services:
  db:
    image: postgres:16-alpine
    container_name: nairalenz_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-nairalenz_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nairalenz_password}
      POSTGRES_DB: ${POSTGRES_DB:-nairalenz_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nairalenz_user} -d ${POSTGRES_DB:-nairalenz_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nairalenz_api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-nairalenz_user}:${POSTGRES_PASSWORD:-nairalenz_password}@db:5432/${POSTGRES_DB:-nairalenz_db}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini

volumes:
  postgres_data:
